<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- ── Viewport & PWA ──────────────────────────────────────────── -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#c9a96e">
  <meta name="description" content="Lee y edita tus libros ePub con elegancia">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Librario">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">

  <!-- Android/Chrome PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- ── Favicon ─────────────────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">

  <title>Librario — ePub Reader</title>

  <!-- ── Estilos ─────────────────────────────────────────────────── -->
  <link rel="stylesheet" href="styles.css">

  <!-- ── CDNs ────────────────────────────────────────────────── -->
  <!-- JSZip debe cargar antes que epub.js -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
</head>

<body>
  <!-- ╔══════════════════════════════════════════════════════════════╗
       ║  App Shell — el contenido lo inyectan las vistas JS         ║
       ╚══════════════════════════════════════════════════════════════╝ -->
  <div id="app" role="main" aria-label="Librario">
    <!-- Estado inicial de carga -->
    <div id="initialLoader" style="
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      background: #0f0e0c;
      color: #c9a96e;
      font-family: 'Georgia', serif;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      z-index: 999;
    ">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Librario
      <div style="
        width: 32px; height: 32px;
        border: 2px solid #2e2b24;
        border-top-color: #c9a96e;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      "></div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
  </div>

  <!-- ── Módulo JS principal ─────────────────────────────────────── -->
  <script type="module" src="js/app.js"></script>

  <!-- Eliminar loader inicial cuando el módulo esté listo -->
  <script>
    window.addEventListener('load', () => {
      // Pequeño delay para que la primera vista tenga tiempo de renderizar
      setTimeout(() => {
        const loader = document.getElementById('initialLoader');
        if (loader) {
          loader.style.transition = 'opacity 0.3s ease';
          loader.style.opacity    = '0';
          setTimeout(() => loader.remove(), 300);
        }
      }, 400);
    });
  </script>
</body>
</html>
